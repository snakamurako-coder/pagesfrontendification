<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>学習アプリ</title>
  <style>
    body { font-family: 'Hiragino Maru Gothic ProN', sans-serif; background-color: #141414; color: white; text-align: center; margin: 0; padding: 20px; }
    h1, h2, h3 { color: #fff; }
    .section { display: none; }
    .active { display: block; }

    /* ユーザー・PIN画面 */
    .user-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
    .user-card { background: #333; padding: 20px; border-radius: 15px; width: 120px; cursor: pointer; transition: 0.2s; }
    .user-card:active { transform: scale(0.95); background: #555; }
    .user-icon { width: 80px; height: 80px; background: #e50914; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; }
    .pin-display { font-size: 40px; letter-spacing: 15px; margin: 20px 0; height: 50px; }
    .numpad { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; justify-content: center; margin-top: 20px; }
    .num-btn { background: #333; color: white; border: none; font-size: 28px; width: 80px; height: 80px; border-radius: 50%; cursor: pointer; }
    .num-btn:active { background: #666; }
    .action-btn { font-size: 20px; background: #555; }
    .cancel-btn { margin-top: 30px; background: none; color: #aaa; border: none; font-size: 18px; cursor: pointer; }
    #message { margin-top: 20px; color: #ff4d4d; font-weight: bold; }

    /* 設定・クイズ画面 */
    .setting-group { margin: 25px 0; background: #222; padding: 15px; border-radius: 10px; }
    .large-select { padding: 15px; font-size: 20px; border-radius: 8px; width: 80%; max-width: 350px; background: #fff; color: #000; border: none; }
    #quiz-q-text { font-size: 36px; margin: 30px 0; font-weight: bold; }
    .choice-btn { display: block; width: 90%; max-width: 400px; margin: 15px auto; padding: 20px; font-size: 22px; background: #333; color: white; border: 2px solid #555; border-radius: 10px; cursor: pointer; }
    .choice-btn:active { background: #555; transform: scale(0.98); }
    .large-input { padding: 15px; font-size: 24px; width: 80%; max-width: 350px; border-radius: 8px; border: none; text-align: center; margin-bottom: 15px; }
    .submit-btn { padding: 15px 40px; font-size: 22px; background: #e50914; color: white; border: none; border-radius: 8px; cursor: pointer; }
    #quiz-feedback { margin: 20px 0; font-size: 24px; min-height: 60px; }
    .next-btn { padding: 15px 50px; font-size: 24px; background: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; display: none; margin: 0 auto; }

    /* ★景品交換画面のスタイル */
    .reward-card { background: #222; border: 2px solid #e50914; border-radius: 10px; padding: 15px; margin: 15px auto; max-width: 400px; text-align: left; }
    .reward-title { font-size: 22px; font-weight: bold; color: gold; margin: 0 0 10px 0; }
    .reward-desc { font-size: 14px; color: #ccc; margin-bottom: 15px; }
    .exchange-btn { background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; width: 100%; font-weight: bold; }
    .exchange-btn:disabled { background: #555; color: #888; cursor: not-allowed; border: none; }
  </style>
</head>
<body>

  <div id="section-users" class="section active">
    <h1>だれがプレイする？</h1>
    <div id="user-container" class="user-list"><p>よみこみ中...</p></div>
  </div>

  <div id="section-pin" class="section">
    <h2 id="selected-user-name">名前</h2>
    <p>あんしょうばんごう（4ケタ）</p>
    <div class="pin-display" id="pin-dots">_ _ _ _</div>
    <div class="numpad">
      <button class="num-btn" onclick="addPin(1)">1</button>
      <button class="num-btn" onclick="addPin(2)">2</button>
      <button class="num-btn" onclick="addPin(3)">3</button>
      <button class="num-btn" onclick="addPin(4)">4</button>
      <button class="num-btn" onclick="addPin(5)">5</button>
      <button class="num-btn" onclick="addPin(6)">6</button>
      <button class="num-btn" onclick="addPin(7)">7</button>
      <button class="num-btn" onclick="addPin(8)">8</button>
      <button class="num-btn" onclick="addPin(9)">9</button>
      <button class="num-btn action-btn" onclick="clearPin()">クリア</button>
      <button class="num-btn" onclick="addPin(0)">0</button>
      <button class="num-btn action-btn" onclick="deletePin()">もどる</button>
    </div>
    <div id="message"></div>
    <button class="cancel-btn" onclick="showUserSelection()">やめる</button>
  </div>

  <div id="section-home" class="section">
    <h1>ホームメニュー</h1>
    <h2 id="welcome-message"></h2>
    <p>げんざいのポイント: <span id="user-points" style="color: gold; font-size: 32px; font-weight: bold;">0</span> Pt</p>
    
    <div style="margin: 30px 0; display: flex; flex-direction: column; gap: 15px; align-items: center;">
      <button style="padding: 20px 40px; font-size: 26px; font-weight: bold; background: #e50914; color: white; border: none; border-radius: 10px; cursor: pointer; width: 90%; max-width: 350px;" onclick="loadMaterials()">▶ 学習をはじめる</button>
      
      <button style="padding: 15px 30px; font-size: 20px; font-weight: bold; background: #FF9800; color: white; border: none; border-radius: 10px; cursor: pointer; width: 90%; max-width: 350px;" onclick="loadRewards()">🎁 けいひんを もらう</button>
    </div>
    
    <button onclick="logout()" style="padding: 10px 20px; background: #555; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px;">ログアウト</button>
  </div>

  <div id="section-rewards" class="section">
    <h1>🎁 けいひん こうかんじょ</h1>
    <p>あなたのポイント: <span id="reward-user-points" style="color: gold; font-size: 24px; font-weight: bold;">0</span> Pt</p>
    
    <div id="rewards-container">
      <p>けいひんを さがしています...</p>
    </div>
    
    <button onclick="showHome(JSON.parse(localStorage.getItem('app_kid_user')))" style="margin-top: 30px; padding: 10px 30px; font-size: 18px; background: #555; color: white; border: none; border-radius: 5px; cursor: pointer;">ホームにもどる</button>
  </div>

  <div id="section-materials" class="section">
    <h1>なにを勉強する？</h1>
    <div id="materials-container" style="display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto;"></div>
    <br><button onclick="showHome(JSON.parse(localStorage.getItem('app_kid_user')))" style="padding: 10px 20px;">もどる</button>
  </div>

  <div id="section-settings" class="section">
    <h1 id="settings-title">設定</h1>
    <div class="setting-group">
      <h3>1. もんだいの形式</h3>
      <select id="setting-format" class="large-select"><option value="ja_to_en">日本語 ➔ 英語にする</option><option value="en_to_ja">英語 ➔ 日本語にする</option></select>
    </div>
    <div class="setting-group">
      <h3>2. こたえ方</h3>
      <select id="setting-answer-type" class="large-select"><option value="4choice">４択（えらぶ）</option><option value="typing">タイピング（入力する）</option></select>
    </div>
    <div class="setting-group">
      <h3>3. 出し方</h3>
      <select id="setting-order" class="large-select"><option value="normal">順番どおり</option><option value="random">ランダム</option></select>
    </div>
    <button onclick="fetchQuestionsAndStart()" style="padding: 15px 50px; font-size: 26px; background: #e50914; color: white; border-radius: 10px; border: none; cursor: pointer;">🚀 スタート！</button>
    <br><button onclick="switchSection('section-materials')" style="margin-top: 20px; padding: 10px 20px;">もどる</button>
  </div>

  <div id="section-quiz" class="section">
    <h3 id="quiz-progress" style="color: #aaa;">第 1 問</h3>
    <div id="quiz-q-text">もんだい文</div>
    <div id="quiz-answer-area"></div>
    <div id="quiz-feedback"></div>
    <button id="quiz-next-btn" class="next-btn" onclick="nextQuestion()">つぎへ ▶</button>
  </div>

  <div id="section-result" class="section">
    <h1>けっかはっぴょう！</h1>
    <div id="result-content" style="background: #222; padding: 20px; border-radius: 10px; margin: 20px auto; max-width: 400px;"></div>
    <button onclick="showHome(JSON.parse(localStorage.getItem('app_kid_user')))" id="result-home-btn" style="padding: 15px 30px; background: #e50914; color: white; border: none; border-radius: 8px; cursor: pointer; display: none;">ホームにもどる</button>
  </div>

  <script>
    // ★GASのURLを忘れずに変更してください
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwC3GDUpcsMey-wCcFVedx1SCscoAclaywZ1MW3KFDVgDCk8r7ymqwEaB3NUXC4BoAzBg/exec";
    
    let selectedUserId = null; let currentPin = "";
    let currentModeId = ""; let currentModeName = ""; let currentUnitName = "";
    let currentQuestions = []; let filteredQuestions = []; let currentQuestionIndex = 0; let quizResults = []; let questionStartTime = 0;

    window.onload = () => { const saved = localStorage.getItem('app_kid_user'); if (saved) showHome(JSON.parse(saved)); else fetchUsers(); };
    function switchSection(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    // --- ログイン関連 ---
    function fetchUsers() { fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: "get_child_users" }) }).then(r => r.json()).then(d => { if(d.status==="success") renderUsers(d.users); }); }
    function renderUsers(users) {
      const c = document.getElementById('user-container'); c.innerHTML = "";
      users.forEach(u => { const div = document.createElement('div'); div.className = 'user-card'; div.onclick = () => showPinScreen(u.id, u.name); div.innerHTML = `<div class="user-icon">${u.name.charAt(0)}</div><div>${u.name}</div>`; c.appendChild(div); });
    }
    function showUserSelection() { switchSection('section-users'); currentPin = ""; updatePinDisplay(); }
    function showPinScreen(id, name) { selectedUserId = id; currentPin = ""; updatePinDisplay(); document.getElementById('selected-user-name').innerText = name; switchSection('section-pin'); }
    function addPin(num) { if(currentPin.length<4){ currentPin+=num; updatePinDisplay(); if(currentPin.length===4) verifyPin(); } }
    function deletePin() { currentPin = currentPin.slice(0,-1); updatePinDisplay(); }
    function clearPin() { currentPin = ""; updatePinDisplay(); }
    function updatePinDisplay() { let d=""; for(let i=0;i<4;i++) d+=(i<currentPin.length)?"● ":"_ "; document.getElementById('pin-dots').innerText=d.trim(); }
    function verifyPin() {
      document.getElementById('message').innerText = "かくにん中...";
      fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: "verify_kid_pin", userId: selectedUserId, pin: currentPin }) })
      .then(r => r.json()).then(d => { if(d.status==="success"){ localStorage.setItem('app_kid_user', JSON.stringify(d.user)); showHome(d.user); } else { document.getElementById('message').innerText = d.message; currentPin=""; updatePinDisplay(); } });
    }
    function showHome(user) { switchSection('section-home'); document.getElementById('welcome-message').innerText = `ようこそ、${user.name} さん！`; document.getElementById('user-points').innerText = user.points; }
    function logout() { localStorage.removeItem('app_kid_user'); showUserSelection(); }

    // --- ★景品交換システム（ここが新しい機能です！） ---
    function loadRewards() {
      switchSection('section-rewards');
      const user = JSON.parse(localStorage.getItem('app_kid_user'));
      document.getElementById('reward-user-points').innerText = user.points;
      document.getElementById('rewards-container').innerHTML = "<p>けいひんを さがしています...</p>";

      fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: "get_rewards" }) })
      .then(r => r.json())
      .then(data => {
        if(data.status === "success") renderRewards(data.rewards, user.points);
        else alert("エラー: " + data.message);
      });
    }

    function renderRewards(rewards, currentPoints) {
      const container = document.getElementById('rewards-container');
      container.innerHTML = "";

      rewards.forEach(reward => {
        const canExchange = currentPoints >= reward.points; // ポイントが足りているか判定
        const div = document.createElement('div');
        div.className = "reward-card";
        div.innerHTML = `
          <h3 class="reward-title">${reward.name}</h3>
          <p class="reward-desc">${reward.desc}</p>
          <button class="exchange-btn" ${canExchange ? "" : "disabled"} 
                  onclick="exchangeReward('${reward.id}', '${reward.name}', ${reward.points})">
            ${reward.points} Pt で こうかんする
          </button>
        `;
        container.appendChild(div);
      });
    }

    function exchangeReward(rewardId, rewardName, points) {
      if(!confirm(`「${rewardName}」を こうかんしますか？\n（${points} Pt つかいます）`)) return;

      const user = JSON.parse(localStorage.getItem('app_kid_user'));
      
      fetch(GAS_API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: "exchange_reward", userId: user.id, rewardId: rewardId })
      })
      .then(r => r.json())
      .then(data => {
        if(data.status === "success") {
          alert("🎉 " + data.message + "\n（管理者の人に伝えてね！）");
          // ローカルのポイントを更新
          user.points = data.newPoints;
          localStorage.setItem('app_kid_user', JSON.stringify(user));
          // ホーム画面に戻る
          showHome(user);
        } else {
          alert("エラー: " + data.message);
        }
      });
    }

    // --- クイズ関連 ---
    function loadMaterials() {
      switchSection('section-materials'); document.getElementById('materials-container').innerHTML = "<p>よみこみ中...</p>";
      fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: "get_materials_list" }) }).then(r=>r.json()).then(d=>{ if(d.status==="success") renderMaterials(d.materials); });
    }
    function renderMaterials(m) {
      const c = document.getElementById('materials-container'); c.innerHTML = "";
      m.forEach(mode => {
        const title = document.createElement('h2'); title.innerText = `📁 ${mode.modeName}`; c.appendChild(title);
        mode.units.forEach(unit => {
          const btn = document.createElement('button'); btn.innerText = `📄 ${unit}`; btn.style.padding="15px"; btn.style.fontSize="18px"; btn.style.background="#333"; btn.style.color="white"; btn.style.border="none"; btn.style.borderRadius="8px"; btn.style.cursor="pointer";
          btn.onclick = () => showSettingsScreen(mode.modeId, mode.modeName, unit); c.appendChild(btn);
        });
      });
    }
    function showSettingsScreen(mId, mName, uName) { currentModeId = mId; currentModeName = mName; currentUnitName = uName; switchSection('section-settings'); document.getElementById('settings-title').innerText = `【${mName}】${uName}`; }
    function fetchQuestionsAndStart() {
      fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: "get_questions", modeId: currentModeId, unitName: currentUnitName }) }).then(r=>r.json()).then(d=>{ if(d.status==="success"){ currentQuestions = d.questions; prepareQuiz(); } });
    }
    function prepareQuiz() {
      const order = document.getElementById('setting-order').value;
      filteredQuestions = [...currentQuestions];
      if (order === 'random') filteredQuestions.sort(() => Math.random() - 0.5);
      currentQuestionIndex = 0; quizResults = []; switchSection('section-quiz'); showQuestion();
    }
    function showQuestion() {
      if (currentQuestionIndex >= filteredQuestions.length) { finishQuiz(); return; }
      const q = filteredQuestions[currentQuestionIndex]; const format = document.getElementById('setting-format').value; const answerType = document.getElementById('setting-answer-type').value;
      document.getElementById('quiz-progress').innerText = `第 ${currentQuestionIndex + 1} 問 / 全 ${filteredQuestions.length} 問`;
      let enText = q["英単語"] || q["英文"]; let jaText = q["日本語"]; let qText = "", correctA = "";
      if (format === "ja_to_en") { qText = jaText; correctA = enText; } else { qText = enText; correctA = jaText; }
      document.getElementById('quiz-q-text').innerText = qText; document.getElementById('quiz-feedback').innerHTML = ""; document.getElementById('quiz-next-btn').style.display = "none";
      const answerArea = document.getElementById('quiz-answer-area'); answerArea.innerHTML = "";
      questionStartTime = Date.now();

      if (answerType === "4choice") {
        let choices = [correctA];
        let others = currentQuestions.filter(item => (item["英単語"] || item["英文"]) !== enText).sort(() => Math.random() - 0.5);
        for (let i = 0; i < 3 && i < others.length; i++) choices.push(format === "ja_to_en" ? (others[i]["英単語"] || others[i]["英文"]) : others[i]["日本語"]);
        choices.sort(() => Math.random() - 0.5);
        choices.forEach(c => { const btn = document.createElement('button'); btn.innerText = c; btn.className = "choice-btn"; btn.onclick = () => checkAnswer(c, correctA, q); answerArea.appendChild(btn); });
      } else {
        answerArea.innerHTML = `<input type="text" id="type-answer" class="large-input" autocomplete="off"><br><button onclick="checkTypingAnswer()" class="submit-btn">こたえる</button>`;
      }
    }
    function checkTypingAnswer() {
      const userA = document.getElementById('type-answer').value; const q = filteredQuestions[currentQuestionIndex]; const format = document.getElementById('setting-format').value;
      checkAnswer(userA, format === "ja_to_en" ? (q["英単語"] || q["英文"]) : q["日本語"], q);
    }
    function checkAnswer(userA, correctA, q) {
      document.querySelectorAll('.choice-btn, .submit-btn').forEach(b => b.disabled = true);
      const isCorrect = userA.trim().toLowerCase() === correctA.trim().toLowerCase();
      quizResults.push({ questionId: q["通し番号"], isCorrect: isCorrect, timeSec: Math.round((Date.now() - questionStartTime) / 1000), basePoint: 10, deduction: 0 });
      const feedback = document.getElementById('quiz-feedback');
      if (isCorrect) feedback.innerHTML = "<span style='color: #4CAF50; font-size: 30px; font-weight: bold;'>⭕️ せいかい！</span>";
      else feedback.innerHTML = `<span style='color: #F44336; font-size: 30px; font-weight: bold;'>❌ ざんねん...</span><br>せいかいは：<b style="color: #fff;">${correctA}</b>`;
      document.getElementById('quiz-next-btn').style.display = "block";
    }
    function nextQuestion() { currentQuestionIndex++; showQuestion(); }
    
    function finishQuiz() {
      switchSection('section-result'); document.getElementById('result-content').innerHTML = "<p>おくっています...</p>"; document.getElementById('result-home-btn').style.display = "none";
      const user = JSON.parse(localStorage.getItem('app_kid_user'));
      fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: "save_learning_session", userId: user.id, unitId: `${currentModeName}_${currentUnitName}`, isReviewMode: false, results: quizResults }) })
      .then(r => r.json()).then(d => {
        if(d.status === "success") {
          document.getElementById('result-content').innerHTML = `<h2 style="color: #4CAF50;">✨ おつかれさま！ ✨</h2><p>かくとくポイント: <span style="color: gold; font-size: 30px;">+${d.earnedPoints}</span></p><hr><p>合計ポイント: ${d.newTotal}</p>`;
          user.points = d.newTotal; localStorage.setItem('app_kid_user', JSON.stringify(user));
          document.getElementById('result-home-btn').style.display = "block";
        }
      });
    }
  </script>
</body>
</html>
