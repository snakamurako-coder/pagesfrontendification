<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>学習アプリ ログイン</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <div id="g_id_onload"
       data-client_id="505252303455-84r495bnnsgiefcrv24ro2qtohlgbk2h.apps.googleusercontent.com"
       data-context="signin"
       data-ux_mode="popup"
       data-callback="handleCredentialResponse"
       data-auto_prompt="false">
  </div>
  
  <div class="g_id_signin" data-type="standard"></div>
  <div id="message" style="margin-top: 20px; font-weight: bold;"></div>

  <script>
    function handleCredentialResponse(response) {
      const idToken = response.credential;
      // あなたのGASウェブアプリのURLに変更してください
      const gasApiUrl = "https://script.google.com/macros/s/AKfycbxGgT4nZO2qqATW_TpOam3AHBqhmyu7e-uF2Q6FA56nqri5Bc_Y-a2PtwJ987IWE2zS/exec";

      document.getElementById('message').innerText = "認証情報を確認しています...";

      fetch(gasApiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ idToken: idToken })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === "success") {
          // 認証成功時：GASから username や role が返ってくる！
          const user = data.user;
          document.getElementById('message').innerText = 
            `ようこそ、${user.username} さん！ (権限: ${user.role})`;
            
          // 例: role によって処理を分ける
          if (user.role === 'admin') {
            console.log("管理者メニューを展開します");
          } else {
            console.log("一般ユーザー用の画面を展開します");
          }
          // ここからメインアプリの起動処理などを呼ぶ
          
        } else {
          // 認証失敗時
          document.getElementById('message').innerText = `エラー: ${data.message}`;
        }
      })
      .catch(error => {
        console.error("通信エラー:", error);
        document.getElementById('message').innerText = "サーバーとの通信に失敗しました。";
      });
    }
  </script>
</body>
</html>
