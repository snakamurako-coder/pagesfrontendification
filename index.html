<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>学習アプリ ログイン</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <div id="g_id_onload"
       data-client_id="505252303455-84r495bnnsgiefcrv24ro2qtohlgbk2h.apps.googleusercontent.com"
       data-context="signin"
       data-ux_mode="popup"
       data-callback="handleCredentialResponse"
       data-auto_prompt="false">
  </div>
  
  <div class="g_id_signin" data-type="standard"></div>
  <div id="message" style="margin-top: 20px; font-weight: bold;"></div>
  
  <button onclick="testAppFunction()" style="margin-top: 20px;">アプリからユーザー情報を呼び出すテスト</button>

  <script>
    // --------------------------------------------------------
    // 【重要】アプリ内のどこからでもユーザー情報を呼び出せる関数
    // --------------------------------------------------------
    function getUserInfo() {
      const storedData = localStorage.getItem('app_user_data');
      if (storedData) {
        return JSON.parse(storedData); // JSON文字列をオブジェクトに戻して返す
      }
      return null; // ログインしていない場合はnull
    }

    // --------------------------------------------------------
    // 認証処理
    // --------------------------------------------------------
    function handleCredentialResponse(response) {
      const idToken = response.credential;
      // あなたのGASウェブアプリのURLに変更してください
      const gasApiUrl = "https://script.google.com/macros/s/AKfycbyqLinjsDrAWX8SZo5zHYMf1gwLKC4jKqL_ru-6xVrb2NssHw6T8MfsTL1V7XO53I05/exec";

      document.getElementById('message').innerText = "認証情報を確認しています...";

      fetch(gasApiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ idToken: idToken })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === "success") {
          const user = data.user;
          
          // ★ここでブラウザ(localStorage)にユーザーの全データを保存する
          localStorage.setItem('app_user_data', JSON.stringify(user));

          // 画面表示
          document.getElementById('message').innerText = 
            `ようこそ、${user.username} さん！ (ID: ${user.id}, 権限: ${user.role})`;
            
        } else {
          document.getElementById('message').innerText = `エラー: ${data.message}`;
        }
      })
      .catch(error => {
        console.error("通信エラー:", error);
        document.getElementById('message').innerText = "サーバーとの通信に失敗しました。";
      });
    }

    // --------------------------------------------------------
    // アプリ側から呼び出すテスト関数（使い方）
    // --------------------------------------------------------
    function testAppFunction() {
      const currentUser = getUserInfo(); // 保存されたデータを呼び出し
      
      if (currentUser) {
        // スプレッドシートの見出し名（キー）で自由にデータを取り出せます
        console.log("取り出したユーザー情報:", currentUser);
        alert(`現在のログインユーザーのIDは ${currentUser.id} です。\n（その他の任意項目もConsoleで確認できます）`);
      } else {
        alert("まだログインしていません。");
      }
    }
  </script>
</body>
</html>
